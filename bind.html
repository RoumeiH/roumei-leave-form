<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>柔美飯店假單 · 身分綁定</title>
<style>
  :root{
    --ink:#1a2b3c; --ink-soft:#54657a; --line:#d8e0e8;
    --bg:#f4f6f9; --paper:#ffffff; --brand:#2b6cb0; --brand-dark:#1f4f82;
    --accent:#c89b3c; --danger:#c53030; --ok:#2f9e6d;
    --shadow:0 4px 20px rgba(26,43,60,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{min-height:100%;background:var(--bg);color:var(--ink);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{padding:0 0 40px}

  .head{
    background:linear-gradient(135deg,var(--brand-dark),var(--brand));
    color:#fff;padding:28px 22px 24px;text-align:center;
  }
  .head h1{font-size:19px;font-weight:800;letter-spacing:.5px;
    display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px}
  .head .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 3px rgba(200,155,60,.3)}
  .head p{font-size:12.5px;opacity:.9;margin-top:8px;line-height:1.6}

  .lineinfo{
    padding:14px 22px;background:#fff;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:10px;font-size:13px;
  }
  .lineinfo img{width:36px;height:36px;border-radius:50%;background:#eee}
  .lineinfo b{color:var(--ink)}
  .lineinfo small{color:var(--ink-soft);display:block;font-size:11px}

  .container{padding:20px 20px 0}
  .prompt{font-size:14px;color:var(--ink-soft);margin-bottom:16px;padding:0 4px;line-height:1.6}

  .roster{display:flex;flex-direction:column;gap:9px}
  .card{
    background:#fff;border:2px solid var(--line);border-radius:11px;padding:14px 16px;
    display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s;
  }
  .card:active{transform:scale(.98)}
  .card:hover{border-color:var(--brand);box-shadow:var(--shadow)}
  .card.taken{opacity:.5;cursor:not-allowed;background:#f7f7f7}
  .card.taken:hover{border-color:var(--line);box-shadow:none}
  .card.selected{border-color:var(--brand);background:#eef4fa}
  .card .avatar{
    width:44px;height:44px;border-radius:50%;background:var(--brand);
    color:#fff;font-weight:800;display:grid;place-items:center;font-size:15px;flex-shrink:0;
  }
  .card .info{flex:1;min-width:0}
  .card .fn{font-size:15.5px;font-weight:700;color:var(--ink)}
  .card .meta{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .card .badge{padding:3px 8px;background:#eef4fa;color:var(--brand-dark);
    border-radius:5px;font-size:11px;font-weight:700}
  .card.taken .badge{background:#eee;color:#999}

  .bottom{
    position:fixed;bottom:0;left:0;right:0;background:#fff;
    padding:14px 20px 22px;border-top:1px solid var(--line);
    box-shadow:0 -4px 20px rgba(0,0,0,.06);
  }
  .btn{
    width:100%;padding:14px;background:var(--brand);color:#fff;
    border:none;border-radius:10px;font-size:15px;font-weight:800;
    cursor:pointer;font-family:inherit;transition:.15s;letter-spacing:1px;
  }
  .btn:disabled{background:#c0d0e0;cursor:not-allowed}
  .btn:active:not(:disabled){transform:scale(.98)}

  .msg{
    margin:16px 20px;padding:14px;border-radius:10px;
    font-size:13.5px;font-weight:600;line-height:1.6;
  }
  .msg.err{background:#fdecea;color:var(--danger)}
  .msg.ok{background:#e6f6ed;color:var(--ok)}
  .msg.info{background:#e6f3fb;color:var(--brand-dark)}

  .loading{text-align:center;padding:40px 20px;color:var(--ink-soft)}
</style>
</head>
<body>

<div class="head">
  <h1><span class="dot"></span>柔美飯店 · 假單簽核</h1>
  <p>Beauty Hotels · Leave Form</p>
</div>

<div id="msgBox"></div>

<div class="container">
  <div class="prompt">
    請點選您的姓名,以完成身分綁定。<br>
    綁定後,系統會透過 LINE 通知您簽核假單。
  </div>
  <div id="rosterList" class="loading">載入員工名單中...</div>
</div>

<div class="bottom" id="bottomBar" style="display:none">
  <button class="btn" id="submitBtn" disabled onclick="submitBind()">請先選擇姓名</button>
</div>

<script>
  // 從網址取得 LINE user ID(來自 webhook 推送的連結)
  const params = new URLSearchParams(location.search);
  const lineUserId = params.get('token');
  let selectedEmp = null;
  let rosterData = [];

  window.onload = async () => {
    if (!lineUserId) {
      showMsg('err', '缺少必要參數,請從 LINE 訊息中的連結進入本頁。');
      document.getElementById('rosterList').textContent = '';
      return;
    }
    await loadRoster();
  };

  async function loadRoster() {
    try {
      const res = await fetch('/api/bind');
      if (!res.ok) throw new Error('讀取失敗');
      const data = await res.json();
      rosterData = data.roster;
      renderRoster();
      document.getElementById('bottomBar').style.display = 'block';
    } catch (err) {
      showMsg('err', '讀取員工名單失敗,請稍後再試。' + err.message);
    }
  }

  function renderRoster() {
    const list = document.getElementById('rosterList');
    list.className = 'roster';
    list.innerHTML = rosterData.map(r => {
      const taken = r.takenBy && r.takenBy.confirmed;
      const isMe = r.takenBy && r.takenBy.lineUserId === lineUserId;
      const disabled = taken && !isMe;
      const badgeText = isMe ? '已綁定(您)' : (taken ? '已被綁定' : r.dept);
      const initial = r.fullName.slice(0,1);
      return `
        <div class="card ${disabled?'taken':''}"
             data-emp="${r.empKey}"
             onclick="${disabled?'':`selectEmp('${r.empKey}')`}">
          <div class="avatar">${initial}</div>
          <div class="info">
            <div class="fn">${r.fullName}</div>
            <div class="meta">${r.empKey}</div>
          </div>
          <span class="badge">${badgeText}</span>
        </div>
      `;
    }).join('');
  }

  function selectEmp(empKey) {
    selectedEmp = empKey;
    // 更新視覺
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    document.querySelector(`[data-emp="${empKey}"]`)?.classList.add('selected');
    // 更新按鈕
    const emp = rosterData.find(r => r.empKey === empKey);
    const btn = document.getElementById('submitBtn');
    btn.textContent = `確認我是 ${emp.fullName}`;
    btn.disabled = false;
  }

  async function submitBind() {
    if (!selectedEmp) return;
    const emp = rosterData.find(r => r.empKey === selectedEmp);
    if (!confirm(`確定您是「${emp.fullName}」嗎?\n\n綁定後將由管理者確認。`)) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '送出中...';

    try {
      const res = await fetch('/api/bind', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lineUserId, empKey: selectedEmp }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '送出失敗');

      showMsg('ok', data.msg || '綁定申請已送出,等待管理者確認。');
      document.getElementById('bottomBar').style.display = 'none';
    } catch (err) {
      showMsg('err', err.message);
      btn.disabled = false;
      btn.textContent = `確認我是 ${emp.fullName}`;
    }
  }

  function showMsg(type, text) {
    document.getElementById('msgBox').innerHTML =
      `<div class="msg ${type}">${text}</div>`;
    window.scrollTo(0, 0);
  }
</script>
</body>
</html>
