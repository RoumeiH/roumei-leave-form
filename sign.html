<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>柔美飯店假單 · 簽名</title>
<style>
  :root{
    --ink:#1a2b3c; --ink-soft:#54657a; --line:#d8e0e8; --line-soft:#eef2f6;
    --bg:#f4f6f9; --paper:#ffffff;
    --brand:#2b6cb0; --brand-dark:#1f4f82;
    --accent:#c89b3c; --danger:#c53030; --ok:#2f9e6d;
    --shadow:0 4px 20px rgba(26,43,60,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
  html,body{
    min-height:100%;background:var(--bg);color:var(--ink);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
    touch-action:manipulation;
    -webkit-text-size-adjust:100%;
  }
  body{padding-bottom:16px}

  /* 頁首 */
  .head{
    background:linear-gradient(135deg,var(--brand-dark),var(--brand));
    color:#fff;padding:22px 22px 18px;text-align:center;
  }
  .head h1{font-size:19px;font-weight:800;letter-spacing:.5px;
    display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px}
  .head .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 3px rgba(200,155,60,.3)}
  .head p{font-size:12px;opacity:.85;margin-top:5px;letter-spacing:1px}
  .head .subtitle{font-size:13.5px;font-weight:700;margin-top:6px;letter-spacing:1px}

  .container{padding:14px 14px 0;max-width:640px;margin:0 auto}

  .form-card{
    background:#fff;border:2px solid var(--brand-dark);border-radius:11px;
    padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);
  }
  .form-card .fc-title{
    text-align:center;font-size:16px;font-weight:800;letter-spacing:5px;
    color:var(--brand-dark);padding-bottom:9px;margin-bottom:11px;
    border-bottom:2px solid var(--brand-dark);
  }
  .form-card .row{
    display:flex;padding:6px 0;border-bottom:1px solid #eaf0f5;font-size:13.5px;line-height:1.7;
  }
  .form-card .row:last-child{border-bottom:none}
  .form-card .row .lb{
    width:68px;flex-shrink:0;font-weight:700;color:var(--ink-soft);letter-spacing:2px;
  }
  .form-card .row .val{flex:1;color:var(--ink);font-weight:600;word-break:break-all}
  .form-card .row .val.big{font-size:15px;font-weight:800;letter-spacing:1px}
  .form-card .seg{padding:4px 0;font-size:13px;border-bottom:1px dashed #eaf0f5}
  .form-card .seg:last-child{border-bottom:none}

  .form-no{
    display:inline-block;background:var(--brand);color:#fff;
    padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;
    letter-spacing:1px;margin-right:8px;vertical-align:middle;
  }

  .btn-bar{padding:12px 14px 8px}
  .btn-primary{
    width:100%;padding:15px;background:var(--brand);color:#fff;
    border:none;border-radius:10px;font-size:15.5px;font-weight:800;
    cursor:pointer;font-family:inherit;letter-spacing:2px;
    box-shadow:0 2px 8px rgba(43,108,176,.35);transition:.15s;
  }
  .btn-primary:disabled{background:#c0d0e0;cursor:not-allowed;box-shadow:none}
  .btn-primary:active:not(:disabled){transform:scale(.98)}

  .msg{
    padding:13px 16px;border-radius:9px;font-size:13.5px;font-weight:600;
    margin:0 14px 12px;line-height:1.65;
  }
  .msg.err{background:#fdecea;color:var(--danger)}
  .msg.ok{background:#e6f6ed;color:var(--ok)}
  .msg.info{background:#e6f3fb;color:var(--brand-dark)}
  .msg.warn{background:#fff8e6;color:#8a5a10}

  .loading{text-align:center;padding:60px 20px;color:var(--ink-soft);font-size:14px}
  .loading .spin{
    display:inline-block;width:30px;height:30px;border:3px solid #eef4fa;
    border-top-color:var(--brand);border-radius:50%;
    animation:spin 1s linear infinite;margin-bottom:12px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .done-card{
    background:#fff;border-radius:11px;padding:32px 22px;text-align:center;
    box-shadow:var(--shadow);margin:20px 16px;
  }
  .done-card .big{font-size:60px;color:var(--ok);margin-bottom:12px}
  .done-card h2{font-size:19px;color:var(--ink);margin-bottom:8px;letter-spacing:1px}
  .done-card p{font-size:13.5px;color:var(--ink-soft);line-height:1.7}
  .done-card .time{
    display:inline-block;margin-top:12px;padding:6px 14px;
    background:#e6f6ed;color:var(--ok);border-radius:6px;font-size:12.5px;font-weight:700;
  }

  /* ===== 全螢幕橫放簽名頁 ===== */
  .sign-fullscreen{
    position:fixed;inset:0;background:#fff;z-index:9999;
    display:none;flex-direction:column;
    /* 鎖死縮放 */
    touch-action:none;
    overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;
  }
  .sign-fullscreen.on{display:flex}
  .sf-top{
    background:var(--brand-dark);color:#fff;padding:10px 16px;
    display:flex;justify-content:space-between;align-items:center;
    font-size:13px;font-weight:700;flex-shrink:0;
  }
  .sf-back{
    background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;
    padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;
  }
  .sf-info{font-size:12.5px;letter-spacing:1px}
  .sf-canvas-wrap{
    flex:1;position:relative;background:#fbfcfd;
    padding:14px;overflow:hidden;
    touch-action:none;
  }
  .sf-canvas-inner{
    width:100%;height:100%;
    border:2px dashed #b4c4d3;border-radius:10px;background:#fff;
    position:relative;overflow:hidden;
    touch-action:none;
  }
  .sf-hint{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    color:#c0cbd6;font-size:15px;pointer-events:none;letter-spacing:1px;font-weight:600;
    text-align:center;
  }
  .sf-hint.hidden{display:none}
  canvas.pad-full{
    display:block;width:100%;height:100%;
    touch-action:none;cursor:crosshair;
  }
  .sf-bottom{
    display:flex;gap:10px;padding:10px 14px 14px;background:#fff;
    border-top:1px solid var(--line);flex-shrink:0;
  }
  .sf-bottom button{
    flex:1;padding:14px;border:none;border-radius:10px;
    font-size:15px;font-weight:800;font-family:inherit;letter-spacing:1px;
    cursor:pointer;transition:.15s;
  }
  .sf-clear{background:#fff;border:2px solid #d8a55a !important;color:#8a5a10}
  .sf-clear:active{background:#fbe6c3}
  .sf-confirm{background:var(--ok);color:#fff}
  .sf-confirm:active{background:#268a5f}
  .sf-confirm:disabled{background:#c0d0e0;cursor:not-allowed}

  /* 直放時強制要求橫放的遮罩 */
  .rotate-mask{
    position:absolute;inset:0;background:#fff;z-index:10;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:30px;color:var(--ink-soft);
  }
  .rotate-mask.hidden{display:none}
  .rotate-mask .icon{
    font-size:70px;margin-bottom:16px;
    animation:rotateHint 2s ease-in-out infinite;
  }
  .rotate-mask h3{font-size:17px;color:var(--ink);margin-bottom:8px;letter-spacing:2px}
  .rotate-mask p{font-size:13.5px;line-height:1.7}
  @keyframes rotateHint{
    0%,40%,100%{transform:rotate(0deg)}
    60%,90%{transform:rotate(-90deg)}
  }
</style>
</head>
<body>

<div class="head">
  <h1><span class="dot"></span>柔美飯店假單 · 簽名</h1>
  <p>Beauty Hotels · Sign</p>
  <div class="subtitle" id="headSubtitle">載入中...</div>
</div>

<div id="root">
  <div class="loading">
    <div class="spin"></div>
    <div>載入假單中...</div>
  </div>
</div>

<!-- 橫放簽名頁 -->
<div class="sign-fullscreen" id="signFull">
  <div class="sf-top">
    <button class="sf-back" onclick="closeSignFull()">← 返回檢視</button>
    <div class="sf-info" id="sfInfo">請簽名 · 共 - 張</div>
  </div>
  <div class="sf-canvas-wrap">
    <div class="sf-canvas-inner">
      <div class="sf-hint" id="sfHint">請在框內簽名</div>
      <canvas class="pad-full" id="padFull"></canvas>
    </div>
    <!-- 直放時的旋轉提示遮罩(全覆蓋) -->
    <div class="rotate-mask" id="rotateMask">
      <div class="icon">📱</div>
      <h3>請將手機橫放</h3>
      <p>簽名區域會變得更大更方便,<br>簽名比例也才會正確蓋到假單。</p>
    </div>
  </div>
  <div class="sf-bottom">
    <button class="sf-clear" onclick="clearPadFull()">重簽</button>
    <button class="sf-confirm" id="btnConfirmSign" disabled onclick="submitBatchSign()">確認送出</button>
  </div>
</div>

<script>
// 防止縮放(iOS 手勢)
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());

// 防止雙擊縮放
let lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

const params = new URLSearchParams(location.search);
const empKey = params.get('emp');
const singleId = params.get('id');
let formsList = [];
let empFull = '', empKeyStore = '';

const KIND_LABEL = {
  leave: '請假單',
  ot: '加班單',
  miss: '未刷卡證明單',
  wrong: '休假誤刷證明',
  multiLeave: '請假單(多段)',
};

window.onload = async () => {
  if (!empKey && !singleId) {
    showErr('缺少必要參數,請從 LINE 訊息中的連結進入本頁。');
    return;
  }
  await loadForms();
};

async function loadForms() {
  try {
    if (empKey) {
      const res = await fetch('/api/sign?emp=' + encodeURIComponent(empKey));
      if (!res.ok) {
        const err = await res.json().catch(()=>({}));
        throw new Error(err.error || '載入失敗');
      }
      const data = await res.json();
      formsList = data.forms || [];
      empKeyStore = data.empKey;
      if (formsList.length === 0) return renderNoPending();
      empFull = formsList[0].fullName || empKey;
      document.getElementById('headSubtitle').textContent =
        `${empFull} · 共 ${formsList.length} 張假單`;
      renderList();
    } else if (singleId) {
      const res = await fetch('/api/sign?id=' + encodeURIComponent(singleId));
      if (!res.ok) {
        const err = await res.json().catch(()=>({}));
        throw new Error(err.error || '載入失敗');
      }
      const data = await res.json();
      if (data.alreadySigned) return renderDone(data.employeeSignedAt);
      formsList = [data];
      empFull = data.fullName || data.empKey;
      empKeyStore = data.empKey;
      document.getElementById('headSubtitle').textContent = `${empFull} · 1 張假單`;
      renderList();
    }
  } catch (err) {
    showErr('載入失敗:' + err.message);
  }
}

function renderNoPending() {
  document.getElementById('headSubtitle').textContent = '';
  document.getElementById('root').innerHTML = `
    <div class="done-card">
      <div class="big">✅</div>
      <h2>目前沒有待簽假單</h2>
      <p>您所有的假單皆已完成簽名<br>有新假單時系統會再通知您</p>
    </div>
  `;
}

function renderList() {
  const Y = formsList[0].rocYear || 115;
  const cards = formsList.map((f, i) => renderFormCard(f, i + 1, Y)).join('');
  document.getElementById('root').innerHTML = `
    <div class="msg info">
      📝 <b>共 ${formsList.length} 張假單</b>,請確認內容無誤後,點下方按鈕開始簽名。<br>
      <small style="font-weight:400">簽名後將自動蓋到全部 ${formsList.length} 張假單上。</small>
    </div>
    <div class="container">${cards}</div>
    <div class="btn-bar">
      <button class="btn-primary" onclick="openSignFull()">
        ✍️ 我已確認,前往簽名 (${formsList.length} 張)
      </button>
    </div>
  `;
}

function renderFormCard(f, num, Y) {
  const kind = KIND_LABEL[f.type] || '假單';
  const dept = f.dept || '';

  let dateHtml = '';
  if (f.type === 'multiLeave' && f.segments) {
    dateHtml = `
      <div class="row">
        <div class="lb">日期</div>
        <div class="val">
          ${f.segments.map(s => {
            const isRange = !(s.startMon===s.endMon && s.startDay===s.endDay);
            const sh = s.shift ? ` (${s.shift.start}–${s.shift.end})` : '';
            const range = isRange
              ? `${Y}/${s.startMon}/${s.startDay} – ${s.endMon}/${s.endDay}`
              : `${Y}/${s.startMon}/${s.startDay}`;
            return `<div class="seg">📅 ${range}${sh}</div>`;
          }).join('')}
        </div>
      </div>
    `;
  } else {
    const endMon = f.endMon || f.mon;
    const endDay = f.endDay || f.day;
    const isRange = (f.mon !== endMon) || (f.day !== endDay);
    const dateStr = isRange
      ? `${Y}/${f.mon}/${f.day} – ${endMon}/${endDay}`
      : `${Y}/${f.mon}/${f.day}`;
    const sh = f.shift;
    const timeStr = sh ? `${sh.start} – ${sh.end}` : '—';
    dateHtml = `
      <div class="row">
        <div class="lb">日期</div>
        <div class="val big">${dateStr}</div>
      </div>
      <div class="row">
        <div class="lb">時間</div>
        <div class="val">${timeStr}</div>
      </div>
    `;
  }

  const reasonText = f.type === 'ot'
    ? (f.comp === '加班費' ? '加班費' : '補休')
    : (f.reason || '');

  return `
    <div class="form-card">
      <div class="fc-title"><span class="form-no">第 ${num} 張</span>${kind}</div>
      <div class="row">
        <div class="lb">姓名</div>
        <div class="val big">${f.fullName || f.empKey}</div>
      </div>
      <div class="row">
        <div class="lb">職稱</div>
        <div class="val">${dept}</div>
      </div>
      ${dateHtml}
      ${reasonText ? `
      <div class="row">
        <div class="lb">${f.type === 'ot' ? '加班類型' : '事由'}</div>
        <div class="val">${reasonText}</div>
      </div>` : ''}
    </div>
  `;
}

/* ===== 橫放簽名頁 ===== */
let canvasFull, ctxFull, drawingFull = false, hasDrawn = false;
let orientationHandler = null;
let resizeHandler = null;

function openSignFull() {
  const el = document.getElementById('signFull');
  el.classList.add('on');
  document.getElementById('sfInfo').textContent =
    `${empFull} · 共 ${formsList.length} 張`;
  document.body.style.overflow = 'hidden';

  // 監聽旋轉
  orientationHandler = () => {
    checkOrientation();
    setTimeout(reInitPad, 250);   // 旋轉完 canvas 大小會變,要重畫
  };
  resizeHandler = () => {
    checkOrientation();
    setTimeout(reInitPad, 100);
  };
  window.addEventListener('orientationchange', orientationHandler);
  window.addEventListener('resize', resizeHandler);

  checkOrientation();
  setTimeout(initPadFull, 50);
}

function closeSignFull() {
  const el = document.getElementById('signFull');
  el.classList.remove('on');
  document.body.style.overflow = '';
  if (orientationHandler) window.removeEventListener('orientationchange', orientationHandler);
  if (resizeHandler) window.removeEventListener('resize', resizeHandler);
  orientationHandler = null;
  resizeHandler = null;
}

function isPortrait() {
  return window.innerHeight > window.innerWidth;
}

function checkOrientation() {
  const mask = document.getElementById('rotateMask');
  // 直放且螢幕不夠寬(排除電腦模擬)→ 顯示遮罩
  if (isPortrait() && window.innerWidth < 500) {
    mask.classList.remove('hidden');
  } else {
    mask.classList.add('hidden');
  }
}

// 重新初始化(旋轉後尺寸變)- 保留已畫的內容
function reInitPad() {
  if (!canvasFull || !ctxFull) return initPadFull();
  // 存畫布內容
  const oldData = hasDrawn ? canvasFull.toDataURL() : null;
  initPadFull();
  // 還原
  if (oldData) {
    const img = new Image();
    img.onload = () => {
      // 依比例貼回
      const rect = canvasFull.getBoundingClientRect();
      ctxFull.drawImage(img, 0, 0, rect.width, rect.height);
    };
    img.src = oldData;
  }
}

function initPadFull() {
  canvasFull = document.getElementById('padFull');
  if (!canvasFull) return;
  const rect = canvasFull.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  // 設定 canvas 像素大小(HD)
  canvasFull.width = Math.round(rect.width * dpr);
  canvasFull.height = Math.round(rect.height * dpr);
  ctxFull = canvasFull.getContext('2d');
  ctxFull.scale(dpr, dpr);
  ctxFull.lineCap = 'round';
  ctxFull.lineJoin = 'round';
  ctxFull.strokeStyle = '#1a2b3c';
  ctxFull.lineWidth = 3.5;

  // 先移除舊的事件監聽,避免重複綁定
  const newCanvas = canvasFull.cloneNode(false);
  canvasFull.parentNode.replaceChild(newCanvas, canvasFull);
  canvasFull = newCanvas;
  ctxFull = canvasFull.getContext('2d');
  ctxFull.scale(dpr, dpr);
  ctxFull.lineCap = 'round';
  ctxFull.lineJoin = 'round';
  ctxFull.strokeStyle = '#1a2b3c';
  ctxFull.lineWidth = 3.5;

  // Touch/Mouse 事件(用 passive:false 確保能 preventDefault)
  canvasFull.addEventListener('touchstart', startDrawFull, { passive: false });
  canvasFull.addEventListener('touchmove', doDrawFull, { passive: false });
  canvasFull.addEventListener('touchend', endDrawFull, { passive: false });
  canvasFull.addEventListener('touchcancel', endDrawFull, { passive: false });
  canvasFull.addEventListener('mousedown', startDrawFull);
  canvasFull.addEventListener('mousemove', doDrawFull);
  canvasFull.addEventListener('mouseup', endDrawFull);
  canvasFull.addEventListener('mouseleave', endDrawFull);
}

// 座標計算(關鍵:考慮 canvas 顯示尺寸和實際 rect)
function getPosFull(evt) {
  const rect = canvasFull.getBoundingClientRect();
  const e = (evt.touches && evt.touches[0]) || (evt.changedTouches && evt.changedTouches[0]) || evt;
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top,
  };
}

function startDrawFull(e) {
  e.preventDefault();
  drawingFull = true;
  hasDrawn = true;
  document.getElementById('sfHint').classList.add('hidden');
  document.getElementById('btnConfirmSign').disabled = false;
  const p = getPosFull(e);
  ctxFull.beginPath();
  ctxFull.moveTo(p.x, p.y);
}

function doDrawFull(e) {
  if (!drawingFull) return;
  e.preventDefault();
  const p = getPosFull(e);
  ctxFull.lineTo(p.x, p.y);
  ctxFull.stroke();
}

function endDrawFull(e) {
  if (drawingFull && e) e.preventDefault();
  drawingFull = false;
}

function clearPadFull() {
  if (!ctxFull || !canvasFull) return;
  ctxFull.clearRect(0, 0, canvasFull.width, canvasFull.height);
  hasDrawn = false;
  document.getElementById('sfHint').classList.remove('hidden');
  document.getElementById('btnConfirmSign').disabled = true;
}

async function submitBatchSign() {
  if (!hasDrawn) { alert('請先簽名'); return; }
  if (!confirm(`確定送出?將蓋到 ${formsList.length} 張假單。送出後無法修改。`)) return;

  const btn = document.getElementById('btnConfirmSign');
  btn.disabled = true;
  btn.textContent = '送出中...';

  try {
    // 裁掉空白邊 + 壓縮 + 統一寬高比(假單簽名欄是寬型)
    const dataUrl = trimAndCompressSignature(canvasFull);
    const formIds = formsList.map(f => f.id);

    const url = singleId ? '/api/sign?action=submit' : '/api/sign?action=submitBatch';
    const payload = singleId
      ? { id: singleId, signature: dataUrl }
      : { formIds, signature: dataUrl };

    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '送出失敗');

    closeSignFull();
    renderDone(new Date().toISOString(), data.signedCount || formsList.length);
  } catch (err) {
    alert('送出失敗:' + err.message);
    btn.disabled = false;
    btn.textContent = '確認送出';
  }
}

// 裁掉空白邊、統一輸出成扁寬型 500x200(適合貼到假單簽名欄)
function trimAndCompressSignature(srcCanvas) {
  const w = srcCanvas.width;
  const h = srcCanvas.height;
  const ctx = srcCanvas.getContext('2d');
  const img = ctx.getImageData(0, 0, w, h);
  const px = img.data;

  // 找有筆跡的最小/最大 x, y
  let minX = w, minY = h, maxX = 0, maxY = 0;
  let found = false;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const alpha = px[(y * w + x) * 4 + 3];
      if (alpha > 0) {
        found = true;
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }

  if (!found) {
    // 沒筆跡(不應該發生),回原圖白底
    const c = document.createElement('canvas');
    c.width = 500; c.height = 200;
    const cx = c.getContext('2d');
    cx.fillStyle = '#fff';
    cx.fillRect(0, 0, 500, 200);
    return c.toDataURL('image/png');
  }

  // 加點邊界
  const pad = Math.round(Math.min(w, h) * 0.03);
  minX = Math.max(0, minX - pad);
  minY = Math.max(0, minY - pad);
  maxX = Math.min(w - 1, maxX + pad);
  maxY = Math.min(h - 1, maxY + pad);

  const trimW = maxX - minX + 1;
  const trimH = maxY - minY + 1;

  // 統一輸出:白底、寬 500 x 高 200(比例 5:2 適合假單簽名欄)
  const outW = 500, outH = 200;
  const c = document.createElement('canvas');
  c.width = outW;
  c.height = outH;
  const cx = c.getContext('2d');
  cx.fillStyle = '#fff';
  cx.fillRect(0, 0, outW, outH);

  // 等比縮放後置中
  const ratio = Math.min(outW / trimW, outH / trimH);
  const drawW = trimW * ratio;
  const drawH = trimH * ratio;
  const dx = (outW - drawW) / 2;
  const dy = (outH - drawH) / 2;
  cx.drawImage(srcCanvas, minX, minY, trimW, trimH, dx, dy, drawW, drawH);
  return c.toDataURL('image/png');
}

function renderDone(signedAt, count) {
  document.getElementById('headSubtitle').textContent = '';
  const timeStr = signedAt ? new Date(signedAt).toLocaleString('zh-TW', { hour12: false }) : '';
  const cnt = count || formsList.length || 1;
  document.getElementById('root').innerHTML = `
    <div class="done-card">
      <div class="big">✅</div>
      <h2>簽名完成</h2>
      <p>感謝您完成 <b>${cnt} 張</b>假單簽名<br>假單將由主管進行後續簽核</p>
      ${timeStr ? `<div class="time">簽名時間: ${timeStr}</div>` : ''}
    </div>
  `;
}

function showErr(text) {
  document.getElementById('headSubtitle').textContent = '';
  document.getElementById('root').innerHTML = `<div class="msg err">${text}</div>`;
}
</script>
